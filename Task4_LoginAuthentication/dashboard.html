<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="form-box dashboard-card">

        <button class="theme-btn" onclick="toggleTheme()">🌙</button>

        <div class="profile-icon">👩‍💻</div>

        <h1>Welcome to Dashboard</h1>
        <p class="subtitle" id="userInfo">You have successfully logged in.</p>

        <div class="dashboard-grid">
            <div class="dash-box">🔐 Secure Login</div>
            <div class="dash-box">💾 Local Storage</div>
            <div class="dash-box">🌙 Dark Mode</div>
        </div>

        <button onclick="logoutUser()">Logout</button>

    </div>
</div>

<script>
    const user = JSON.parse(localStorage.getItem("user"));
    const isLoggedIn = localStorage.getItem("isLoggedIn");

    if(isLoggedIn !== "true"){
        window.location.href = "index.html";
    }

    if(user){
        document.getElementById("userInfo").innerText =
            "Hello, " + user.username + " 👋 You are logged in securely.";
    }

    function logoutUser(){
        localStorage.setItem("isLoggedIn", "false");
        window.location.href = "index.html";
    }

    function toggleTheme(){
        document.body.classList.toggle("dark");

        if(document.body.classList.contains("dark")){
            localStorage.setItem("theme", "dark");
        }
        else{
            localStorage.setItem("theme", "light");
        }
    }

    window.onload = function(){
        if(localStorage.getItem("theme") === "dark"){
            document.body.classList.add("dark");
        }
    };
</script>

</body>
</html>
